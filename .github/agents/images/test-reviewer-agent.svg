<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Test Reviewer Agent Visualization</title>
  <desc id="desc">A virtual AI test reviewer agent examining quality signals, charts, and test results around a code lab station.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07141b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2029"/>
      <stop offset="100%" stop-color="#09151c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1f2a38" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.32"/>
  <circle cx="180" cy="120" r="120" fill="#38bdf8" opacity="0.08"/>
  <circle cx="1000" cy="540" r="150" fill="#2dd4bf" opacity="0.08"/>
  <rect x="70" y="60" width="1060" height="555" rx="34" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
  <rect x="70" y="60" width="1060" height="8" rx="4" fill="url(#accent)"/>
  <ellipse cx="600" cy="565" rx="280" ry="44" fill="#081217" opacity="0.85"/>
  <g transform="translate(585 325)">
    <circle cx="0" cy="-92" r="74" fill="#e0f2fe"/>
    <rect x="-55" y="-138" width="110" height="28" rx="14" fill="#0f3f55"/>
    <rect x="-54" y="-105" width="108" height="40" rx="20" fill="#0c1a1f" stroke="#67e8f9" stroke-width="4"/>
    <circle cx="-24" cy="-85" r="8" fill="#67e8f9"/>
    <circle cx="24" cy="-85" r="8" fill="#67e8f9"/>
    <path d="M-18 -58 Q0 -46 18 -58" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
    <rect x="-92" y="-10" width="184" height="176" rx="34" fill="#e0f2fe" opacity="0.94"/>
    <rect x="-60" y="28" width="120" height="24" rx="12" fill="#38bdf8" opacity="0.22"/>
    <circle cx="0" cy="84" r="24" fill="#67e8f9" opacity="0.45"/>
    <path d="M-92 34 L-146 90" stroke="#d1d5db" stroke-width="22" stroke-linecap="round"/>
    <path d="M92 34 L148 92" stroke="#d1d5db" stroke-width="22" stroke-linecap="round"/>
    <path d="M-34 168 L-74 256" stroke="#d1d5db" stroke-width="24" stroke-linecap="round"/>
    <path d="M34 168 L74 256" stroke="#d1d5db" stroke-width="24" stroke-linecap="round"/>
    <circle cx="-154" cy="100" r="24" fill="#38bdf8"/>
    <circle cx="154" cy="102" r="24" fill="#2dd4bf"/>
  </g>
  <g filter="url(#glow)">
    <rect x="205" y="205" width="270" height="180" rx="24" fill="#081219" stroke="#38bdf8" stroke-width="3"/>
    <rect x="245" y="312" width="34" height="40" rx="8" fill="none" stroke="#67e8f9" stroke-width="4"/>
    <rect x="302" y="280" width="34" height="72" rx="8" fill="none" stroke="#67e8f9" stroke-width="4"/>
