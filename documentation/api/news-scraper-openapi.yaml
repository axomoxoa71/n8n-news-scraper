openapi: 3.1.0
info:
  title: AI News Scraper API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:4300
paths:
  /api/health:
    get:
      summary: Health check for the profile API
      responses:
        "200":
          description: API is reachable
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /api/profiles:
    get:
      summary: List saved profiles
      responses:
        "200":
          description: Profiles returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
    post:
      summary: Create a new profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Validation error
  /api/profiles/{id}:
    put:
      summary: Update an existing profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Validation error
        "404":
          description: Profile not found
    delete:
      summary: Delete an existing profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Profile deleted
        "404":
          description: Profile not found
  /api/sources:
    get:
      summary: List available sources
      responses:
        "200":
          description: Sources returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Source"
    post:
      summary: Create a new source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceInput"
      responses:
        "201":
          description: Source created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "400":
          description: Validation error
  /api/sources/{id}:
    put:
      summary: Update an existing source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceInput"
      responses:
        "200":
          description: Source updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "400":
          description: Validation error
        "404":
          description: Source not found
    delete:
      summary: Delete an existing source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Source deleted
        "404":
          description: Source not found
  /api/news:
    get:
      summary: List news items for a selected source
      parameters:
        - name: sourceId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Source news returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsItem"
        "400":
          description: Invalid sourceId query value
    post:
      summary: Create a news item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsItemInput"
      responses:
        "201":
          description: News item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "400":
          description: Validation error
        "409":
          description: Duplicate newsId
  /api/news/{id}/favorite:
    put:
      summary: Update favorite state for one news item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsFavoriteUpdate"
      responses:
        "200":
          description: Favorite state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
        "400":
          description: Validation error
        "404":
          description: News item not found for source
  /api/errors:
    get:
      summary: List scrape errors with optional profile filter
      parameters:
        - name: profileId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: timeFrame
          in: query
          required: false
          schema:
            type: string
            enum: [lastHour, lastDay, lastWeek, lastMonth, all]
        - name: externalRefId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Errors returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErrorItem"
        "400":
          description: Invalid profileId query value when provided
  /api/errors/external-references:
    get:
      summary: List distinct error external references
      responses:
        "200":
          description: External references returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErrorExternalReference"
    post:
      summary: Create a scrape error entry for a profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorItemInput"
      responses:
        "201":
          description: Error entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorItem"
        "400":
          description: Validation error
  /api/errors/{id}:
    get:
      summary: Get one scrape error with optional profile filter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: profileId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Error returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorItem"
        "400":
          description: Validation error
        "404":
          description: Error not found
  /api/notification-profiles:
    get:
      summary: List notification profiles
      responses:
        "200":
          description: Notification profiles returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationProfile"
    post:
      summary: Create a notification profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationProfileInput"
      responses:
        "201":
          description: Notification profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationProfile"
        "400":
          description: Validation error
  /api/notification-profiles/{id}:
    put:
      summary: Update a notification profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationProfileInput"
      responses:
        "200":
          description: Notification profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationProfile"
        "400":
          description: Validation error
        "404":
          description: Notification profile not found
    delete:
      summary: Delete a notification profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Notification profile deleted
        "404":
          description: Notification profile not found
  /api/news/profile/scrape:
    post:
      summary: Trigger scrape webhook for a profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profileId]
              properties:
                profileId:
                  type: integer
      responses:
        "202":
          description: Trigger request accepted by backend
        "404":
          description: Profile or linked information channel not found
          content:
            application/json:
              schema:
                type: object
  /api/news/source/scrape:
    post:
      summary: Trigger scrape webhook for a source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceId]
              properties:
                sourceId:
                  type: integer
      responses:
        "202":
          description: Trigger request accepted by backend
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: accepted
        "400":
          description: Validation error
        "404":
          description: Source not found
        "502":
          description: Upstream scrape webhook call failed
        "503":
          description: Scrape webhook configuration is missing
                required: [status]
                properties:
                  status:
                    type: string
                    example: accepted
        "400":
          description: Validation error
        "502":
          description: Upstream scrape webhook call failed
        "503":
          description: Scrape webhook configuration is missing
  /api/profiles/{id}/chats:
    get:
      summary: List persisted chat rows for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Persisted chat rows returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
        "400":
          description: Invalid profile id
  /api/profiles/{id}/chat-history:
    get:
      summary: List chat history messages for a profile with optional filters
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
        - name: quality
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10
        - name: timePeriod
          in: query
          required: false
          schema:
            type: string
            enum: [last_hour, last_day, last_week, last_month, all]
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [user, assistant, all]
      responses:
        "200":
          description: Chat history returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatHistoryMessage"
        "400":
          description: Validation error
  /api/chats/quick-reply:
    get:
      summary: List quick-reply prompts for chatbot
      responses:
        "200":
          description: Quick replies returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatQuickReply"
  /api/chats/{id}:
    get:
      summary: Get one persisted chat row by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat message returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "400":
          description: Validation error
        "404":
          description: Chat message not found
  /api/chats/dispatch:
    post:
      summary: Dispatch chatbot message for synchronous UI response (non-persistent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Chatbot synchronous response completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatDispatchResponse"
        "400":
          description: Validation error
        "404":
          description: Profile not found
        "502":
          description: Webhook returned failed or invalid response
        "503":
          description: Chatbot webhook configuration is missing
        "504":
          description: Chatbot webhook timed out
  /api/chats:
    post:
      summary: Create persistent chatbot message and update response status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "201":
          description: Persisted chat row created/updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "400":
          description: Validation error
        "404":
          description: Profile not found
        "502":
          description: Webhook returned failed or invalid response
        "503":
          description: Chatbot webhook configuration is missing
        "504":
          description: Chatbot webhook timed out
components:
  schemas:
    ProfileUrl:
      type: object
      required: [url, description]
      properties:
        url:
          type: string
          format: uri
        description:
          type: string
    RssSettings:
      type: object
      required: [feedUrl, title, refreshCadence, format, category]
      properties:
        feedUrl:
          type: string
          format: uri
        title:
          type: string
        refreshCadence:
          type: string
        format:
          type: string
        category:
          type: string
    ProfileInput:
      type: object
      required:
        [name, description, useCustomSources, tags, roles, urls, rssFeeds]
      properties:
        name:
          type: string
        description:
          type: string
        useCustomSources:
          type: boolean
          description: When true, user-provided URL and RSS sources are required. When false, API stores empty source arrays and AI-recommended sources are used.
          default: false
        tags:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            type: string
          description: Optional role labels for profile metadata and background scraping context. Duplicate names are rejected case-insensitively.
        urls:
          type: array
          items:
            $ref: "#/components/schemas/ProfileUrl"
          description: Required with at least 1 entry only when useCustomSources=true.
        rssFeeds:
          type: array
          items:
            $ref: "#/components/schemas/RssSettings"
          description: Required with at least 1 entry only when useCustomSources=true.
        notificationProfileId:
          type: integer
          nullable: true
          description: Backward-compatible single notification profile id. When notificationChannelIds is provided, this value is normalized to the first selected channel id.
        notificationChannelIds:
          type: array
          items:
            type: integer
            minimum: 1
          description: Optional multi-select notification channel ids associated with the profile. Every id must exist in notification profiles; unknown ids return 400.
    Profile:
      allOf:
        - $ref: "#/components/schemas/ProfileInput"
        - type: object
          required: [id]
          properties:
            id:
              type: integer
    SourceUrlEntry:
      type: object
      required: [url]
      properties:
        id:
          type: integer
        url:
          type: string
          format: uri
        description:
          type: string
    SourceRssFeedEntry:
      type: object
      required: [feedUrl]
      properties:
        id:
          type: integer
        feedUrl:
          type: string
          format: uri
        description:
          type: string
    SourceInput:
      type: object
      required: [name, urls, rssFeeds]
      properties:
        name:
          type: string
        description:
          type: string
        urls:
          type: array
          items:
            $ref: "#/components/schemas/SourceUrlEntry"
        rssFeeds:
          type: array
          items:
            $ref: "#/components/schemas/SourceRssFeedEntry"
    Source:
      allOf:
        - $ref: "#/components/schemas/SourceInput"
        - type: object
          required: [id]
          properties:
            id:
              type: integer
    NewsItem:
      type: object
      required:
        [id, newsId, sourceId, title, summary, link, timestamp, favorite, ragStatus]
      properties:
        id:
          type: integer
        newsId:
          type: string
          description: News identifier stored as text. Seeded records use SHA-256(link + title).
        sourceId:
          type: integer
        title:
          type: string
        summary:
          type: string
        origin:
          type: string
        link:
          type: string
          format: uri
        timestamp:
          type: string
          format: date-time
        favorite:
          type: boolean
        ragStatus:
          type: string
          enum: [NEW, PROCESSING, DONE]
          description: RAG enrichment processing status. Defaults to NEW.
    NewsItemInput:
      type: object
      required: [newsId, sourceId, title, summary, link]
      properties:
        newsId:
          type: string
          description: News identifier stored as text. Seeded records use SHA-256(link + title).
        sourceId:
          type: integer
        title:
          type: string
        summary:
          type: string
        origin:
          type: string
        link:
          type: string
          format: uri
        timestamp:
          type: string
          format: date-time
        favorite:
          type: boolean
        ragStatus:
          type: string
          enum: [NEW, PROCESSING, DONE]
          description: Optional on create; defaults to NEW when omitted.
    NewsFavoriteUpdate:
      type: object
      required: [sourceId, favorite]
      properties:
        sourceId:
          type: integer
        favorite:
          type: boolean
    ErrorItemInput:
      type: object
      required:
        [
          profileId,
          errorMessage,
          errorDescription,
          errorStack,
          errorHttpCode,
          nodeName,
          nodeType,
          workflowName,
          workflowId,
          json,
        ]
      properties:
        profileId:
          type: integer
        traceId:
          type: string
          description: Optional trace identifier. If omitted, backend generates one.
        errorMessage:
          type: string
        errorDescription:
          type: string
        errorStack:
          type: string
        errorHttpCode:
          type: integer
          minimum: 100
          maximum: 999
        nodeName:
          type: string
        nodeType:
          type: string
        workflowName:
          type: string
        workflowId:
          type: string
        json:
          type: object
          additionalProperties: true
    ErrorItem:
      allOf:
        - $ref: "#/components/schemas/ErrorItemInput"
        - type: object
          required: [id, createdTs, updatedTs]
          properties:
            id:
              type: integer
            createdTs:
              type: string
              format: date-time
            updatedTs:
              type: string
              format: date-time
    ErrorExternalReference:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
        id:
          type: string
    NotificationProfileInput:
      type: object
      required: [name, channels]
      properties:
        name:
          type: string
        description:
          type: string
        channels:
          type: array
          items:
            oneOf:
              - type: object
                required: [channelType, emailAddresses]
                properties:
                  channelType:
                    type: string
                    enum: [email]
                  emailAddresses:
                    type: array
                    items:
                      type: string
                      format: email
              - type: object
                required: [channelType, slackWebhookUrl]
                properties:
                  channelType:
                    type: string
                    enum: [slack]
                  slackWebhookUrl:
                    type: string
                    format: uri
    NotificationProfile:
      allOf:
        - $ref: "#/components/schemas/NotificationProfileInput"
        - type: object
          required: [id]
          properties:
            id:
              type: integer
    ChatMessageInput:
      type: object
      required: [profileId, sessionId, message]
      properties:
        profileId:
          type: integer
        sessionId:
          type: string
        message:
          type: string
    ChatMessage:
      type: object
      required:
        [
          id,
          profileId,
          sessionId,
          message,
          traceId,
          status,
          createdTs,
          updatedTs,
        ]
      properties:
        id:
          type: integer
        profileId:
          type: integer
        sessionId:
          type: string
        message:
          type: string
        agentResponse:
          type: string
          nullable: true
        n8nExecutionId:
          type: string
          nullable: true
        traceId:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        createdTs:
          type: string
          format: date-time
        updatedTs:
          type: string
          format: date-time
    ChatDispatchResponse:
      type: object
      required: [sessionId, message, agentResponse, status]
      properties:
        sessionId:
          type: string
        message:
          type: string
        agentResponse:
          type: string
        executionId:
          type: string
          nullable: true
        status:
          type: string
          enum: [completed]
    ChatQuickReply:
      type: object
      required: [name, prompt]
      properties:
        name:
          type: string
        prompt:
          type: string
    ChatHistoryMessage:
      type: object
      required: [id, sessionId, message, role, createdTs]
      properties:
        id:
          type: integer
        profileId:
          type: integer
          nullable: true
        sessionId:
          type: string
        message:
          type: string
        role:
          type: string
          enum: [user, assistant]
        quality:
          type: integer
          nullable: true
        createdTs:
          type: string
          format: date-time
