      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      .hero-root {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }

      .hero-svg {
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100vh;
      }

      @keyframes pulse-core {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }

        50% {
          opacity: 0.85;
          transform: scale(1.06);
        }
      }

      @keyframes ring-breathe {
        0%,
        100% {
          opacity: 0.18;
        }

        50% {
          opacity: 0.06;
        }
      }

      @keyframes ring-breathe2 {
        0%,
        100% {
          opacity: 0.12;
        }

        50% {
          opacity: 0.04;
        }
      }

      @keyframes synapse {
        0%,
        100% {
          opacity: 0.15;
        }

        50% {
          opacity: 0.55;
        }
      }

      @keyframes float-label {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-5px);
        }
      }

      @keyframes cursor-blink {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0;
        }
      }

      @keyframes spin-cw {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spin-ccw {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(-360deg);
        }
      }

      @keyframes orbitWP {
        from {
          transform: rotate(0deg) translateX(155px) rotate(0deg);
        }

        to {
          transform: rotate(360deg) translateX(155px) rotate(-360deg);
        }
      }

      @keyframes orbitRSS {
        from {
          transform: rotate(190deg) translateX(185px) rotate(-190deg);
        }

        to {
          transform: rotate(550deg) translateX(185px) rotate(-550deg);
        }
      }

        }

        to {
          transform: rotate(670deg) translateX(125px) rotate(-670deg);
        }

          transform: rotate(85deg) translateX(200px) rotate(-85deg);
        }

        to {
          transform: rotate(445deg) translateX(200px) rotate(-445deg);
